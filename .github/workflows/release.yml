name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write # Required for cosign keyless signing via OIDC

defaults:
  run:
    shell: bash

jobs:
  lint-and-test:
    uses: ./.github/workflows/lint-and-test.yml

  release:
    name: Release
    needs: [lint-and-test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Go version
        id: go-version
        run: echo "version=$(grep '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ steps.go-version.outputs.version }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: [release]
    if: ${{ !contains(github.ref, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download ${{ github.ref_name }} --repo ${{ github.repository }} --pattern checksums.txt

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: timorunge/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        run: |
          VERSION="${{ github.ref_name }}"
          BARE="${VERSION#v}"

          get_sha() {
            grep "$1" checksums.txt | awk '{print $1}'
          }

          SHA_X86_MACOS=$(get_sha "certree_${BARE}_Darwin_x86_64.tar.gz")
          SHA_ARM_MACOS=$(get_sha "certree_${BARE}_Darwin_arm64.tar.gz")
          SHA_X86_LINUX=$(get_sha "certree_${BARE}_Linux_x86_64.tar.gz")
          SHA_ARM_LINUX=$(get_sha "certree_${BARE}_Linux_arm64.tar.gz")

          F=tap/Formula/certree.rb

          sed -i "s/version \".*\"/version \"${BARE}\"/" "$F"
          sed -i "/Darwin_x86_64/{n;s/sha256 \".*\"/sha256 \"${SHA_X86_MACOS}\"/}" "$F"
          sed -i "/Darwin_arm64/{n;s/sha256 \".*\"/sha256 \"${SHA_ARM_MACOS}\"/}" "$F"
          sed -i "/Linux_x86_64/{n;s/sha256 \".*\"/sha256 \"${SHA_X86_LINUX}\"/}" "$F"
          sed -i "/Linux_arm64/{n;s/sha256 \".*\"/sha256 \"${SHA_ARM_LINUX}\"/}" "$F"

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/certree.rb
          git diff --staged --quiet || git commit -m "certree: update to ${{ github.ref_name }}"
          git push
